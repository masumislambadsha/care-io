<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dark Mode Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>
  </head>
  <body class="bg-white dark:bg-slate-950 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-slate-900 dark:text-white">
          Dark Mode Test
        </h1>
        <button
          onclick="document.documentElement.classList.toggle('dark')"
          class="px-4 py-2 bg-teal-600 text-white rounded-lg hover:bg-teal-700"
        >
          Toggle Dark Mode
        </button>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div
          class="bg-white dark:bg-slate-800 p-6 rounded-lg border border-slate-200 dark:border-slate-700"
        >
          <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-2">
            Card 1
          </h2>
          <p class="text-slate-600 dark:text-slate-400">
            This should change colors
          </p>
        </div>
        <div
          class="bg-white dark:bg-slate-800 p-6 rounded-lg border border-slate-200 dark:border-slate-700"
        >
          <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-2">
            Card 2
          </h2>
          <p class="text-slate-600 dark:text-slate-400">
            This should change colors
          </p>
        </div>
      </div>

      <div
        class="mt-8 p-4 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 rounded-lg"
      >
        <p class="text-amber-900 dark:text-amber-200">
          If this changes color, dark mode is working!
        </p>
      </div>

      <div class="mt-4 p-4 bg-slate-100 dark:bg-slate-900 rounded-lg">
        <p class="text-slate-700 dark:text-slate-300">
          Current HTML class:
          <span id="htmlClass" class="font-mono font-bold"></span>
        </p>
      </div>
    </div>

    <script>
      function updateClass() {
        document.getElementById("htmlClass").textContent =
          document.documentElement.className || "(none)";
      }
      updateClass();
      setInterval(updateClass, 100);
    </script>
  </body>
</html>
